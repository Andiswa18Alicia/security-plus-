<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Security+ Platform | Mido Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#040810;--card:#0c1628;--border:rgba(0,200,255,0.12);--border2:rgba(0,200,255,0.3);--text:#d0e4f7;--muted:#4a6a8a;--cyan:#00c8ff;--green:#00ff9d;--red:#ff3b5c}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;animation:gm 20s linear infinite}
@keyframes gm{0%{background-position:0 0}100%{background-position:50px 50px}}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,200,255,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(0,255,157,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.scanline{position:fixed;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.25),transparent);animation:sc 5s linear infinite;z-index:0;pointer-events:none}
@keyframes sc{0%{top:-2px}100%{top:100vh}}
.corner{position:fixed;width:60px;height:60px;border-color:rgba(0,200,255,0.15);border-style:solid;pointer-events:none}
.tl{top:16px;left:16px;border-width:2px 0 0 2px}.tr{top:16px;right:16px;border-width:2px 2px 0 0}
.bl{bottom:16px;left:16px;border-width:0 0 2px 2px}.br{bottom:16px;right:16px;border-width:0 2px 2px 0}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.logo-area{text-align:center;margin-bottom:2rem}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,rgba(0,200,255,0.15),rgba(0,200,255,0.05));border:1px solid var(--border2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.8rem;box-shadow:0 0 30px rgba(0,200,255,0.15)}
.logo-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:0.1em;color:var(--cyan)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;color:var(--muted);margin-top:0.3rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:420px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.tabs{display:flex;gap:0;margin-bottom:1.8rem;background:rgba(255,255,255,0.03);border-radius:8px;padding:4px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:0.55rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:0.08em;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:6px;transition:all 0.2s}
.tab-btn.active{background:rgba(0,200,255,0.12);color:var(--cyan)}
.tab-btn:hover:not(.active){color:var(--text)}
.panel{display:none}.panel.active{display:block}
.field{margin-bottom:1.2rem}
.field label{display:block;font-family:'Share Tech Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;color:var(--text);font-family:'Exo 2',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.field input:focus{border-color:var(--border2);box-shadow:0 0 0 3px rgba(0,200,255,0.08)}
.field input::placeholder{color:var(--muted);font-size:0.85rem}
.field .hint{font-size:0.67rem;color:var(--muted);margin-top:0.35rem;font-family:'Share Tech Mono',monospace}
.btn-primary{width:100%;padding:0.85rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:0.08em;background:var(--cyan);color:#040810;border:none;border-radius:8px;cursor:pointer;transition:all 0.2s;margin-top:0.5rem}
.btn-primary:hover:not(:disabled){box-shadow:0 4px 24px rgba(0,200,255,0.35);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none}
.btn-link{background:none;border:none;color:var(--cyan);font-size:0.8rem;cursor:pointer;padding:0;font-family:'Exo 2',sans-serif;text-decoration:underline;text-underline-offset:3px}
.btn-link:hover{color:#fff}
.reset-row{text-align:right;margin-top:0.4rem}
.msg{display:none;margin-top:1rem;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;line-height:1.5}
.msg.err{background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.3);color:var(--red)}
.msg.ok{background:rgba(0,255,157,0.08);border:1px solid rgba(0,255,157,0.25);color:var(--green)}
.domain-tag{text-align:center;margin-top:1.5rem;font-family:'Share Tech Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;color:var(--muted);border-top:1px solid var(--border);padding-top:1rem}
.domain-tag span{color:var(--cyan)}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="page">
  <div class="logo-area">
    <div class="logo-icon">🔐</div>
    <div class="logo-title">SECURITY+</div>
    <div class="logo-sub">SY0-701 LEARNING PLATFORM · MIDO ACADEMY</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">SIGN IN</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">REGISTER</button>
    </div>

    <!-- SIGN IN PANEL -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="li-email" placeholder="you@midoacademy.org.za" autocomplete="email"/>
        <div class="hint">⚡ Must end with @midoacademy.org.za</div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="li-pass" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <div class="reset-row">
        <button class="btn-link" onclick="handleReset()">Forgot password?</button>
      </div>
      <button class="btn-primary" id="li-btn" onclick="doLogin()">SIGN IN →</button>
    </div>

    <!-- REGISTER PANEL -->
    <div class="panel" id="panel-register">
      <div class="field">
        <label>Academy Email</label>
        <input type="email" id="reg-email" placeholder="you@midoacademy.org.za" autocomplete="email"/>
        <div class="hint">⚡ Must be your @midoacademy.org.za address</div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Minimum 8 characters" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat your password" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="reg-btn" onclick="doRegister()">CREATE ACCOUNT →</button>
    </div>

    <div id="authMsg" class="msg"></div>

    <div class="domain-tag">
      Access restricted to <span>@midoacademy.org.za</span> accounts only
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         sendPasswordResetEmail, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ─── PASTE YOUR FIREBASE CONFIG HERE ─────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC_s1QFUAbLF8SFAJXIwRdycTwO9tpS7yg",
  authDomain:        "mido-secplus.firebaseapp.com",
  projectId:         "mido-secplus",
  storageBucket:     "mido-secplus.firebasestorage.app",
  messagingSenderId: "438373936200",
  appId:             "1:438373936200:web:6af1d9584ff7e7bf76bc7d"
};
const ALLOWED_DOMAIN = "@midoacademy.org.za";
// ─────────────────────────────────────────────────────────────────

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) window.location.href = "index.html";
});

function showMsg(text, isOk=false){
  const el=document.getElementById('authMsg');
  el.textContent=text; el.className='msg '+(isOk?'ok':'err'); el.style.display='block';
}
function clearMsg(){ document.getElementById('authMsg').style.display='none'; }
function setBtn(id,loading,label){
  const b=document.getElementById(id);
  b.disabled=loading; b.textContent=loading?'PLEASE WAIT...':label;
}
function checkDomain(email){
  if(!email.endsWith(ALLOWED_DOMAIN)){
    showMsg(`Only ${ALLOWED_DOMAIN} accounts are allowed.`); return false;
  }
  return true;
}
const errMap = {
  'auth/user-not-found':       'No account found. Please register first.',
  'auth/wrong-password':       'Incorrect password. Try again or reset.',
  'auth/invalid-credential':   'Incorrect email or password.',
  'auth/too-many-requests':    'Too many attempts. Wait a moment and try again.',
  'auth/user-disabled':        'This account has been disabled. Contact your instructor.',
  'auth/email-already-in-use': 'This email already has an account. Sign in instead.',
  'auth/weak-password':        'Password must be at least 6 characters.',
  'auth/invalid-email':        'Invalid email address format.',
};

window.doLogin = async function(){
  const email = document.getElementById('li-email').value.trim().toLowerCase();
  const pass  = document.getElementById('li-pass').value;
  if(!email||!pass){ showMsg('Please enter your email and password.'); return; }
  if(!checkDomain(email)) return;
  setBtn('li-btn',true,'SIGN IN →');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showMsg('✅ Signed in! Loading your platform...', true);
  } catch(e){
    showMsg(errMap[e.code]||`Error: ${e.message}`);
    setBtn('li-btn',false,'SIGN IN →');
  }
};

window.doRegister = async function(){
  const email   = document.getElementById('reg-email').value.trim().toLowerCase();
  const pass    = document.getElementById('reg-pass').value;
  const confirm = document.getElementById('reg-confirm').value;
  if(!email||!pass||!confirm){ showMsg('Please fill in all fields.'); return; }
  if(!checkDomain(email)) return;
  if(pass!==confirm){ showMsg('Passwords do not match.'); return; }
  if(pass.length<8){ showMsg('Password must be at least 8 characters.'); return; }
  setBtn('reg-btn',true,'CREATE ACCOUNT →');
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    showMsg('✅ Account created! Loading platform...', true);
  } catch(e){
    showMsg(errMap[e.code]||`Error: ${e.message}`);
    setBtn('reg-btn',false,'CREATE ACCOUNT →');
  }
};

window.handleReset = async function(){
  const email = document.getElementById('li-email').value.trim().toLowerCase();
  if(!email){ showMsg('Enter your email address in the field above first.'); return; }
  if(!checkDomain(email)) return;
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg('✅ Password reset email sent! Check your inbox.', true);
  } catch(e){ showMsg(errMap[e.code]||`Error: ${e.message}`); }
};

window.switchTab = function(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  clearMsg();
};

// Enter key support
document.addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  const panel = document.querySelector('.panel.active');
  if(panel?.id==='panel-login') window.doLogin();
  else if(panel?.id==='panel-register') window.doRegister();
});
</script>
</body>
</html>
